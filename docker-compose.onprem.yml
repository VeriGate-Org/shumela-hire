version: '3.8'

services:
  # SQL Server for on-premises deployment
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shumelahire-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "${MSSQL_PID:-Developer}"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./scripts/backup:/backup
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ShumelaHire Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SPRING_PROFILES_ACTIVE: onprem
    container_name: shumelahire-backend
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      DATABASE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=shumelahire;encrypt=true;trustServerCertificate=true"
      DATABASE_USER: sa
      DATABASE_PASS: "${MSSQL_SA_PASSWORD}"
      STORAGE_PROVIDER: local
      UPLOAD_DIR: /app/data/uploads
      AD_ISSUER_URI: "${AD_ISSUER_URI:-}"
      AD_JWK_SET_URI: "${AD_JWK_SET_URI:-}"
      AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID:-}"
      AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID:-}"
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
    volumes:
      - app-uploads:/app/data/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local
  app-uploads:
    driver: local

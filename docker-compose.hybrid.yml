version: '3.8'

services:
  # SQL Server for hybrid deployment
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shumelahire-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-ShumelaH1re!Dev}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Redis for session caching
  redis:
    image: redis:7-alpine
    container_name: shumelahire-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Azurite — Azure Storage emulator for local development
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: shumelahire-azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite-data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    restart: unless-stopped

  # ShumelaHire Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SPRING_PROFILES_ACTIVE: hybrid
    container_name: shumelahire-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: hybrid
      DATABASE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=shumelahire;encrypt=true;trustServerCertificate=true"
      DATABASE_USER: sa
      DATABASE_PASS: "${MSSQL_SA_PASSWORD:-ShumelaH1re!Dev}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_PROVIDER: azure-blob
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1"
      AZURE_STORAGE_CONTAINER: shumelahire-documents
      AZURE_AD_ISSUER_URI: "${AZURE_AD_ISSUER_URI}"
      AZURE_AD_JWK_SET_URI: "${AZURE_AD_JWK_SET_URI}"
      AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID}"
      AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID}"
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
    healthcheck:
      test: wget -qO- http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local
  redis-data:
    driver: local
  azurite-data:
    driver: local

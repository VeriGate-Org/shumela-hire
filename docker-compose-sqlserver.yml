version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DATABASE_PASS:-YourStrong@Passw0rd}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: /bin/bash
    command: >
      -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P '$${MSSQL_SA_PASSWORD}' -C -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'shumelahire') CREATE DATABASE shumelahire\""
    environment:
      MSSQL_SA_PASSWORD: ${DATABASE_PASS:-YourStrong@Passw0rd}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: sqlserver
      DATABASE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=shumelahire;encrypt=true;trustServerCertificate=true
      DATABASE_USER: sa
      DATABASE_PASS: ${DATABASE_PASS:-YourStrong@Passw0rd}
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  sqlserver_data:

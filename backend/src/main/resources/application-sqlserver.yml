spring:
  datasource:
    url: ${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=shumelahire;encrypt=true;trustServerCertificate=true}
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASS}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/sqlserver

  h2:
    console:
      enabled: false

# SQL Server deployment indicator
shumelahire:
  database:
    vendor: sqlserver
  ad:
    enabled: ${AD_ENABLED:false}
    url: ${AD_URL:ldap://localhost:389}
    base-dn: ${AD_BASE_DN:dc=example,dc=com}
    bind-dn: ${AD_BIND_DN:}
    bind-password: ${AD_BIND_PASSWORD:}
    domain: ${AD_DOMAIN:}
    user-search-base: ${AD_USER_SEARCH_BASE:}
    user-search-filter: ${AD_USER_SEARCH_FILTER:(sAMAccountName={0})}
    group-search-base: ${AD_GROUP_SEARCH_BASE:}
    sync:
      enabled: ${AD_SYNC_ENABLED:true}
      cron: ${AD_SYNC_CRON:0 0 * * * *}

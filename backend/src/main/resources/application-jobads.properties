# Job Ads Service Configuration

# Enable/disable the job ad expiration scheduler
job-ad.scheduler.enabled=true

# Logging configuration for job ads
logging.level.com.arthmatic.shumelahire.service.JobAdService=INFO
logging.level.com.arthmatic.shumelahire.scheduler.JobAdExpirationScheduler=INFO

# Enable JPA auditing for automatic timestamps
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Enable scheduling
spring.task.scheduling.enabled=true

# Pool configuration for scheduled tasks
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=job-ads-scheduler-

# Database specific settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws-region:
        required: true
        type: string
        default: af-south-1
      domain-name:
        required: true
        type: string
        default: shumelahire.co.za
    secrets:
      AWS_ROLE_ARN:
        required: true
      CERTIFICATE_ARN:
        required: false
      API_CERTIFICATE_ARN:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      # ── Backend ──────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg SPRING_PROFILES_ACTIVE=${{ inputs.environment }} \
            -t $ECR_REGISTRY/shumelahire-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/shumelahire-backend:latest \
            .
          docker push $ECR_REGISTRY/shumelahire-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/shumelahire-backend:latest

      # ── CDK Deploy ────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: CDK Deploy
        working-directory: infra/cdk
        env:
          SHUMELAHIRE_ENV: ${{ inputs.environment }}
          SHUMELAHIRE_DOMAIN: ${{ inputs.domain-name }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          API_CERTIFICATE_ARN: ${{ secrets.API_CERTIFICATE_ARN }}
        run: |
          npm install -g aws-cdk
          dotnet restore
          dotnet build --no-restore
          cdk deploy --all --require-approval never \
            -c env=${{ inputs.environment }} \
            -c domain=${{ inputs.domain-name }} \
            -c certificateArn="${CERTIFICATE_ARN}" \
            -c apiCertificateArn="${API_CERTIFICATE_ARN}"

      # ── Force ECS Redeployment ────────────────────────────────────────────
      - name: Force ECS redeployment
        run: |
          CLUSTER="shumelahire-${{ inputs.environment }}"
          SERVICE="shumelahire-${{ inputs.environment }}"
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment

      # ── Frontend ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Get CDK outputs
        id: cdk-outputs
        run: |
          PREFIX="shumelahire-${{ inputs.environment }}"
          echo "bucket=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-frontend --query 'Stacks[0].Outputs[?ExportName==`'${PREFIX}-UiBucketName'`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "distribution=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-frontend --query 'Stacks[0].Outputs[?ExportName==`'${PREFIX}-DistributionId'`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "api_url=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-compute --query 'Stacks[0].Outputs[?ExportName==`'${PREFIX}-AlbDnsName'`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(aws cloudformation describe-stacks --stack-name ${PREFIX}-foundation --query 'Stacks[0].Outputs[?OutputKey==`UserPoolClientId`].OutputValue' --output text)" >> $GITHUB_OUTPUT

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: https://${{ steps.cdk-outputs.outputs.api_url }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user_pool_id }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user_pool_client_id }}
          NEXT_PUBLIC_REGION: ${{ inputs.aws-region }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync .next/static s3://${{ steps.cdk-outputs.outputs.bucket }}/_next/static --delete
          aws s3 sync out/ s3://${{ steps.cdk-outputs.outputs.bucket }}/ --delete --exclude "_next/static/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.distribution }} \
            --paths "/*"
